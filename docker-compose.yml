version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: travelagency-postgres
    environment:
      POSTGRES_DB: BDtravelagency
      POSTGRES_USER: travelagency_user
      POSTGRES_PASSWORD: TravelAgency@123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - travelagency-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelagency_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./TravelAgencyBackend
      dockerfile: Dockerfile
    container_name: travelagency-backend
    ports:
      - "8090:8090"
    environment:
      - SERVER_PORT=8090
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=travelagency_user
      - DB_PASSWORD=TravelAgency@123
      - KEYCLOAK_ISSUER_URI=http://keycloak:9090/realms/sisgr-realm
      - KEYCLOAK_JWK_SET_URI=http://keycloak:9090/realms/sisgr-realm/protocol/openid-connect/certs
      - KEYCLOAK_CLIENT_ID=sisgr-backend
      - KEYCLOAK_CLIENT_SECRET=RsKfj92NkQCszmzjNjxdccrvkBI1zneO
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - travelagency-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: travelagency-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    command: start-dev
    networks:
      - travelagency-network
    restart: unless-stopped

  frontend:
    build:
      context: ./travelagencyfrontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_KEYCLOAK_URL: http://localhost:9090
        VITE_KEYCLOAK_REALM: sisgr-realm
        VITE_KEYCLOAK_CLIENT_ID: sisgr-frontend
    container_name: travelagency-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - travelagency-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  travelagency-network:
    driver: bridge
