spring.application.name=TravelAgency
server.port= 8880
spring.datasource.url= jdbc:postgresql://${DB_HOST}:${DB_PORT}/BDtravelagency
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Keycloak / OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/sisgr-realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:9090/realms/sisgr-realm/protocol/openid-connect/certs}
keycloak.client-id=${KEYCLOAK_CLIENT_ID:sisgr-backend}
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:RsKfj92NkQCszmzjNjxdccrvkBI1zneO}

# Parametros de negocio (epicas 4 y 4.1): configurables sin recompilar
travel.booking.pending-expires-days=30
travel.discount.group-min-passengers=4
travel.discount.group-percent=10
travel.discount.frequent-min-paid-bookings=3
travel.discount.frequent-percent=5
travel.discount.multi-package-percent=5
travel.discount.multi-package-lookback-days=7
travel.discount.max-total-percent=20
